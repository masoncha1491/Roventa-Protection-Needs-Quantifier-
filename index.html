<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保障需求量化系统 | Protection Needs Quantifier</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #eef1f4;
      --card: #ffffff;
      --text: #294c66;
      --muted: #74879a;
      --primary: #2f6f98;
      --primary-deep: #255978;
      --primary-soft: #f5efe3;
      --accent: #c89b5d;
      --warn: #a46f23;
      --line: #d9e1e8;
      --shadow: 0 18px 40px rgba(47, 111, 152, 0.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(200, 155, 93, .10) 0%, transparent 28%),
        radial-gradient(circle at top right, rgba(47, 111, 152, .08) 0%, transparent 30%),
        linear-gradient(180deg, #f5f6f8 0%, #edf1f5 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 26px 18px 46px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .brandline {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .lang-switch {
      display: inline-flex;
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      box-shadow: 0 10px 22px rgba(47,111,152,.08);
    }

    .lang-switch button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .lang-switch button.active {
      background: linear-gradient(135deg, #3d88b1 0%, #2f6f98 100%);
      color: #fff;
      box-shadow: 0 8px 18px rgba(47,111,152,.22);
    }

    .hero, .main {
      display: grid;
      gap: 18px;
    }

    .hero {
      grid-template-columns: 1.08fr .92fr;
      margin-bottom: 18px;
    }

    .main {
      grid-template-columns: 420px 1fr;
      align-items: start;
    }

    .card, .panel, .result-card {
      background: var(--card);
      border: 1px solid rgba(217, 225, 232, .96);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card, .panel { padding: 22px; }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.2;
      color: var(--primary-deep);
    }

    .sub, .lead, .hint, .status-note {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .hero-side {
      background: linear-gradient(135deg, #3d88b1 0%, #2f6f98 100%);
      color: #fff;
      border-top: 4px solid var(--accent);
    }

    .hero-side p {
      margin: 8px 0 0;
      line-height: 1.8;
      opacity: .96;
    }

    .panel {
      position: sticky;
      top: 18px;
    }

    .section-title {
      margin: 20px 0 12px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #395874;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: .18s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(200, 155, 93, .12);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .helper {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button.action {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease;
    }

    button.action:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 22px rgba(47, 111, 152, .20);
    }

    .btn-soft {
      background: var(--primary-soft);
      color: var(--primary-deep);
      border: 1px solid rgba(200, 155, 93, .35);
    }

    .note-box {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #e5dcc8;
      background: #fbf8f2;
      color: #5d5b56;
      font-size: 13px;
      line-height: 1.8;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .report {
      padding: 0;
      overflow: hidden;
    }

    .report-shell {
      padding: 28px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfaf8 100%);
      position: relative;
    }

    .report-shell::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
    }

    .report-brand {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 0 0 16px;
      margin-bottom: 18px;
      border-bottom: 1px solid #e5ebf2;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .report-brand strong {
      color: var(--primary-deep);
      font-size: 13px;
      letter-spacing: .12em;
    }

    .report-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .report-title {
      font-size: 28px;
      margin: 0 0 8px;
      color: var(--primary-deep);
    }

    .report-title small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .score-box {
      min-width: 190px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #fbf4e6 0%, #eef7fb 100%);
      border: 1px solid #e4dcc9;
    }

    .score-box .score {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary-deep);
      margin-top: 4px;
    }

    .customer-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 16px;
      background: #fbfbfa;
      border: 1px solid #e4e8ed;
    }

    .customer-info div {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .customer-info strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      margin-top: 2px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .result-card {
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fdfcf9 100%);
    }

    .tag {
      display: inline-flex;
      border-radius: 999px;
      background: rgba(200, 155, 93, 0.12);
      color: #8c6a33;
      border: 1px solid rgba(200, 155, 93, 0.24);
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-card h3 {
      margin: 0 0 8px;
      font-size: 17px;
      color: var(--primary-deep);
    }

    .amount {
      font-size: 31px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--primary-deep);
    }

    .desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .mini-card {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid #e3e7ec;
      background: #fff;
      box-shadow: 0 10px 24px rgba(47, 111, 152, 0.06);
    }

    .mini-card h4 {
      margin: 0 0 12px;
      font-size: 16px;
      color: var(--primary-deep);
    }

    .progress-item { margin-bottom: 14px; }
    .progress-item:last-child { margin-bottom: 0; }

    .progress-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .progress {
      height: 10px;
      background: #edf2f8;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
    }

    .priority-line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px dashed #dde6f0;
      font-size: 14px;
    }

    .priority-line:last-child { border-bottom: 0; }
    .priority-top { color: #b97628; font-weight: 800; }
    .priority-mid { color: var(--warn); font-weight: 800; }
    .priority-low { color: var(--primary); font-weight: 800; }

    .story-box {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #e4e1d9;
      background: #fbf9f4;
      color: #4c6479;
      line-height: 1.85;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .plain-list {
      margin: 0;
      padding-left: 18px;
      color: #486173;
      line-height: 1.8;
      font-size: 14px;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 12px 12px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid #e4edf6;
      line-height: 1.75;
    }

    th {
      background: #f7f5f1;
      color: var(--muted);
      font-weight: 700;
    }

    tr:last-child td { border-bottom: 0; }

    .formula {
      color: #3d6d8d;
      font-weight: 700;
    }

    .download-panel { padding: 22px; }

    .report-foot {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #e3ebf5;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .hero, .main, .cards, .customer-info, .two-col {
        grid-template-columns: 1fr;
      }
      .panel { position: static; }
    }

    @media (max-width: 760px) {
      .topbar { flex-direction: column; align-items: flex-start; }
      .report-shell { padding: 18px; }
      .report-head { flex-direction: column; }
      h1 { font-size: 28px; }
      .amount { font-size: 28px; }
      .priority-line { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brandline">Roventa Group</div>
      <div class="lang-switch">
        <button id="langZh" class="active">中文</button>
        <button id="langEn">English</button>
      </div>
    </div>

    <section class="hero">
      <div class="card">
        <h1 id="mainTitle">保障需求量化系统 | Protection Needs Quantifier</h1>
        <p class="sub" id="mainSubtitle"></p>
      </div>
      <div class="card hero-side">
        <h2 id="heroTitle" style="margin:0;font-size:22px;"></h2>
        <p id="heroText"></p>
      </div>
    </section>

    <section class="main">
      <aside class="panel">
        <h2 id="formTitle" style="margin:0 0 14px;"></h2>

        <div class="grid">
          <div class="field">
            <label id="labelCustomerName" for="customerName"></label>
            <input id="customerName" value="张先生" />
          </div>
          <div class="field">
            <label id="labelBirthday" for="birthday"></label>
            <input id="birthday" type="date" value="1990-01-01" />
          </div>
          <div class="field">
            <label id="labelAge" for="customerAge"></label>
            <input id="customerAge" readonly />
          </div>
          <div class="field">
            <label id="labelReportDate" for="reportDate"></label>
            <input id="reportDate" type="date" />
          </div>
        </div>

        <div class="section-title" id="sectionFamily"></div>
        <div class="grid">
          <div class="field">
            <label id="labelAnnualIncome" for="annualIncome"></label>
            <input id="annualIncome" type="text" inputmode="numeric" value="300000" />
          </div>
          <div class="field">
            <label id="labelAnnualSpend" for="annualSpend"></label>
            <input id="annualSpend" type="text" inputmode="numeric" value="180000" />
          </div>
          <div class="field">
            <label id="labelProtectYears" for="protectYears"></label>
            <input id="protectYears" type="text" inputmode="numeric" value="10" />
          </div>
          <div class="field">
            <label id="labelDependents" for="dependents"></label>
            <input id="dependents" type="text" inputmode="numeric" value="2" />
          </div>
        </div>

        <div class="section-title" id="sectionAssets"></div>
        <div class="grid">
          <div class="field">
            <label id="labelLiabilities" for="liabilities"></label>
            <input id="liabilities" type="text" inputmode="numeric" value="800000" />
          </div>
          <div class="field">
            <label id="labelLiquidAssets" for="liquidAssets"></label>
            <input id="liquidAssets" type="text" inputmode="numeric" value="200000" />
          </div>
          <div class="field">
            <label id="labelExistingLife" for="existingLife"></label>
            <input id="existingLife" type="text" inputmode="numeric" value="300000" />
          </div>
          <div class="field">
            <label id="labelExistingMedical" for="existingMedical"></label>
            <input id="existingMedical" type="text" inputmode="numeric" value="1000000" />
          </div>
          <div class="field full">
            <label id="labelExistingCI" for="existingCI"></label>
            <input id="existingCI" type="text" inputmode="numeric" value="100000" />
          </div>
        </div>

        <div class="section-title" id="sectionExtra"></div>
        <div class="grid">
          <div class="field">
            <label id="labelRecovery" for="specialMedicalBudget"></label>
            <input id="specialMedicalBudget" type="text" inputmode="numeric" value="300000" />
          </div>
          <div class="field">
            <label id="labelMedicalTarget" for="medicalTarget"></label>
            <select id="medicalTarget">
              <option value="1000000">MYR 1,000,000</option>
              <option value="2000000">MYR 2,000,000</option>
              <option value="3000000">MYR 3,000,000</option>
              <option value="4000000">MYR 4,000,000</option>
              <option value="5000000">MYR 5,000,000</option>
            </select>
          </div>
          <div class="field full">
            <label id="labelSpecialBudget" for="specialFamilyBudget"></label>
            <input id="specialFamilyBudget" type="text" inputmode="numeric" value="0" />
          </div>
          <div class="field full">
            <label id="labelNotes" for="notes"></label>
            <textarea id="notes"></textarea>
          </div>
        </div>

        <div class="btn-row">
          <button class="action btn-primary" id="calculateBtn"></button>
          <button class="action btn-soft" id="downloadBtn"></button>
        </div>
        <div class="note-box" id="downloadNote"></div>
      </aside>

      <div class="results">
        <section class="panel report">
          <div class="report-shell" id="reportArea">
            <div class="report-brand">
              <strong>Roventa Group</strong>
              <span id="reportBrandText">Personal Protection Review</span>
            </div>

            <div class="report-head">
              <div>
                <h2 class="report-title" id="reportTitle"></h2>
                <p class="lead" id="reportLead"></p>
              </div>
              <div class="score-box">
                <div class="hint" id="scoreLabel"></div>
                <div class="score" id="riskScore">71 / 100</div>
              </div>
            </div>

            <div class="customer-info">
              <div><span id="metaLabelName"></span><strong id="metaName">张先生</strong></div>
              <div><span id="metaLabelBirthday"></span><strong id="metaBirthday">1990-01-01</strong></div>
              <div><span id="metaLabelAge"></span><strong id="metaAge">36</strong></div>
              <div><span id="metaLabelDate"></span><strong id="metaDate">2026-07-18</strong></div>
            </div>

            <div class="cards">
              <article class="result-card">
                <div class="tag" id="tagLife"></div>
                <h3 id="cardLifeTitle"></h3>
                <div class="amount" id="lifeGapAmount">MYR 2,400,000</div>
                <div class="desc" id="lifeGapDesc"></div>
              </article>
              <article class="result-card">
                <div class="tag" id="tagMedical"></div>
                <h3 id="cardMedicalTitle"></h3>
                <div class="amount" id="medicalGapAmount">MYR 0</div>
                <div class="desc" id="medicalGapDesc"></div>
              </article>
              <article class="result-card">
                <div class="tag" id="tagCI"></div>
                <h3 id="cardCITitle"></h3>
                <div class="amount" id="ciGapAmount">MYR 1,940,000</div>
                <div class="desc" id="ciGapDesc"></div>
              </article>
            </div>

            <div class="two-col">
              <div class="mini-card">
                <h4 id="coverageTitle"></h4>
                <div class="progress-item">
                  <div class="progress-head"><span id="coverageLifeLabel"></span><strong id="lifeCoverageText">17%</strong></div>
                  <div class="progress"><span id="lifeCoverageBar" style="width:17%"></span></div>
                </div>
                <div class="progress-item">
                  <div class="progress-head"><span id="coverageCILabel"></span><strong id="ciCoverageText">5%</strong></div>
                  <div class="progress"><span id="ciCoverageBar" style="width:5%"></span></div>
                </div>
                <div class="progress-item">
                  <div class="progress-head"><span id="coverageMedicalLabel"></span><strong id="medicalCoverageText">100%</strong></div>
                  <div class="progress"><span id="medicalCoverageBar" style="width:100%"></span></div>
                </div>
              </div>

              <div class="mini-card">
                <h4 id="priorityTitle"></h4>
                <div id="priorityList"></div>
              </div>
            </div>

            <div class="story-box" id="scenarioSummary"></div>

            <div class="two-col">
              <div class="mini-card">
                <h4 id="reasonTitle"></h4>
                <ul class="plain-list" id="reasonList"></ul>
              </div>
              <div class="mini-card">
                <h4 id="notesTitle"></h4>
                <ul class="plain-list" id="summaryList"></ul>
              </div>
            </div>

            <div class="mini-card" style="margin-top:14px;">
              <h4 id="detailsTitle"></h4>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th id="tableHead1"></th>
                      <th id="tableHead2"></th>
                      <th id="tableHead3"></th>
                    </tr>
                  </thead>
                  <tbody id="detailRows"></tbody>
                </table>
              </div>
            </div>

            <div class="report-foot">© 2026 Roventa Group. All rights reserved.</div>
          </div>
        </section>

        <section class="panel download-panel">
          <h2 id="downloadPanelTitle" style="margin:0 0 10px;"></h2>
          <p class="status-note" id="downloadPanelText"></p>
          <div class="btn-row">
            <button class="action btn-soft" id="downloadBtn2"></button>
          </div>
          <p class="status-note" id="statusText" style="margin-top:10px;"></p>
        </section>
      </div>
    </section>
  </div>

  <script>
    const currency = new Intl.NumberFormat("en-MY");
    const STORAGE_KEY = "pnq-single-file-v1";
    const fields = [
      "customerName", "birthday", "customerAge", "reportDate",
      "annualIncome", "annualSpend", "protectYears", "dependents",
      "liabilities", "liquidAssets", "existingLife", "existingMedical",
      "existingCI", "specialMedicalBudget", "medicalTarget",
      "specialFamilyBudget", "notes"
    ];
    const numericFields = [
      "annualIncome", "annualSpend", "protectYears", "dependents",
      "liabilities", "liquidAssets", "existingLife", "existingMedical",
      "existingCI", "specialMedicalBudget", "specialFamilyBudget"
    ];

    const translations = {
      zh: {
        htmlLang: "zh-CN",
        mainSubtitle: "根据你的家庭责任、已有保障与财务情况，帮助你更清楚地了解目前保障是否足够，以及哪些部分仍然存在缺口。",
        heroTitle: "填写方式",
        heroText: "填写你的基本资料与当前保障情况后，系统会生成一份清晰的保障需求摘要，并可下载为 PDF。",
        formTitle: "个人资料",
        sectionFamily: "家庭与生活责任",
        sectionAssets: "资产、负债与现有保障",
        sectionExtra: "补充信息",
        labelCustomerName: "姓名",
        labelBirthday: "生日日期",
        labelAge: "年龄",
        labelReportDate: "填写日期",
        labelAnnualIncome: "家庭年收入",
        labelAnnualSpend: "家庭年支出",
        labelProtectYears: "预计需保障年限",
        labelDependents: "被抚养人数",
        labelLiabilities: "现有负债总额",
        labelLiquidAssets: "可动用资产",

    let currentLang = "zh";

    function raw(id) { return document.getElementById(id).value || ""; }
    function txt(id) { return raw(id).trim(); }
    function cleanNumberString(value) { return String(value || "").replace(/[^\d.]/g, ""); }
    function formatNumberString(value) {
      const cleaned = cleanNumberString(value);
      if (!cleaned) return "";
      const [intPart, decimalPart] = cleaned.split(".");
      const formattedInt = Number(intPart || 0).toLocaleString("en-US");
      return decimalPart !== undefined ? `${formattedInt}.${decimalPart}` : formattedInt;
    }
    function formatNumericField(id) {
      const el = document.getElementById(id);
      el.value = formatNumberString(el.value);
    }
    function num(id) { return Math.max(0, Number(cleanNumberString(raw(id)) || 0)); }
    function money(value) { return `MYR ${currency.format(Math.round(value))}`; }
    function pct(value) { return `${Math.round(value)}%`; }
    function clamp(min, value, max) { return Math.max(min, Math.min(value, max)); }
    function formatDate(value) {
      if (value) return value;
      const now = new Date();
      const m = `${now.getMonth() + 1}`.padStart(2, "0");
      const d = `${now.getDate()}`.padStart(2, "0");
      return `${now.getFullYear()}-${m}-${d}`;
    }
    function calcAge(value) {
      if (!value) return "";
      const birth = new Date(value);
      if (Number.isNaN(birth.getTime())) return "";
      const today = new Date();
      let age = today.getFullYear() - birth.getFullYear();
      const monthDiff = today.getMonth() - birth.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
      return age >= 0 ? age : "";
    }
    function syncAge() {
      const age = calcAge(txt("birthday"));
      document.getElementById("customerAge").value = age === "" ? "" : String(age);
      return age;
    }

    function saveDraft() {
      const data = { lang: currentLang };
      fields.forEach(key => data[key] = raw(key));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadDraft() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        if (data.lang && translations[data.lang]) currentLang = data.lang;
        fields.forEach(key => {
          if (Object.prototype.hasOwnProperty.call(data, key)) {
            document.getElementById(key).value = data[key];
          }
        });
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function calculate() {
      const t = translations[currentLang];
      const customerName = txt("customerName") || (currentLang === "zh" ? "客户" : "Customer");
      const birthday = txt("birthday");
      const age = syncAge();
      const reportDate = formatDate(txt("reportDate"));
      const annualIncome = num("annualIncome");
      const annualSpend = num("annualSpend");
      const protectYears = Math.max(1, num("protectYears") || 10);
      const dependents = num("dependents");
      const liabilities = num("liabilities");
      const liquidAssets = num("liquidAssets");
      const existingLife = num("existingLife");
      const existingMedical = num("existingMedical");
      const existingCI = num("existingCI");
      const specialMedicalBudget = num("specialMedicalBudget");
      const medicalTarget = Math.max(1000000, num("medicalTarget"));
      const specialFamilyBudget = num("specialFamilyBudget");
      const notes = txt("notes");

      const educationReserve = dependents * 150000;
      const lifeNeed = annualSpend * protectYears + liabilities + educationReserve + specialFamilyBudget;
      const lifeDeduct = existingLife + liquidAssets;
      const lifeGap = Math.max(0, lifeNeed - lifeDeduct);
      const medicalGap = Math.max(0, medicalTarget - existingMedical);
      const ciYears = Math.min(protectYears, 5);
      const liabilityPressure = liabilities * 0.3;
      const ciNeed = annualIncome * ciYears + specialMedicalBudget + liabilityPressure;
      const ciGap = Math.max(0, ciNeed - existingCI);

      const lifeCoverage = lifeNeed > 0 ? clamp(0, (lifeDeduct / lifeNeed) * 100, 100) : 100;
      const medicalCoverage = medicalTarget > 0 ? clamp(0, (existingMedical / medicalTarget) * 100, 100) : 100;
      const ciCoverage = ciNeed > 0 ? clamp(0, (existingCI / ciNeed) * 100, 100) : 100;
      const riskScore = Math.round((100 - lifeCoverage) * 0.45 + (100 - ciCoverage) * 0.35 + (100 - medicalCoverage) * 0.2);

      document.getElementById("reportDate").value = reportDate;
      document.getElementById("metaName").textContent = customerName;
      document.getElementById("metaBirthday").textContent = birthday || t.notProvided;
      document.getElementById("metaAge").textContent = age === "" ? t.notProvided : `${age}${t.ageSuffix}`.trim();
      document.getElementById("metaDate").textContent = reportDate;
      document.getElementById("riskScore").textContent = `${riskScore} / 100`;

      document.getElementById("lifeGapAmount").textContent = money(lifeGap);
      document.getElementById("medicalGapAmount").textContent = money(medicalGap);
      document.getElementById("ciGapAmount").textContent = money(ciGap);

      if (currentLang === "zh") {
        document.getElementById("lifeGapDesc").textContent = `估算总需求为 ${money(lifeNeed)}，扣除现有寿险与可动用资产 ${money(lifeDeduct)} 后，尚有 ${money(lifeGap)} 缺口。`;
        document.getElementById("medicalGapDesc").textContent = medicalGap > 0
          ? `当前医疗目标额度为 ${money(medicalTarget)}，与现有保障相比仍有 ${money(medicalGap)} 缺口。`
          : `当前医疗目标额度为 ${money(medicalTarget)}，现有保障已可覆盖。`;
        document.getElementById("ciGapDesc").textContent = `按 ${ciYears} 年收入恢复期、康复预算与负债压力池估算后，尚有 ${money(ciGap)} 缺口。`;
      } else {
        document.getElementById("lifeGapDesc").textContent = `Estimated total need is ${money(lifeNeed)}. After deducting existing life coverage / term life cover and liquid assets worth ${money(lifeDeduct)}, the remaining gap is ${money(lifeGap)}.`;
        document.getElementById("medicalGapDesc").textContent = medicalGap > 0
          ? `Your selected medical target is ${money(medicalTarget)} and there is still a gap of ${money(medicalGap)}.`
          : `Your selected medical target is ${money(medicalTarget)} and current cover already reaches that level.`;
        document.getElementById("ciGapDesc").textContent = `Using a ${ciYears}-year income recovery period, recovery budget and liability pressure pool, the remaining gap is ${money(ciGap)}.`;
      }

      document.getElementById("lifeCoverageText").textContent = pct(lifeCoverage);
      document.getElementById("medicalCoverageText").textContent = pct(medicalCoverage);
      document.getElementById("ciCoverageText").textContent = pct(ciCoverage);
      document.getElementById("lifeCoverageBar").style.width = `${lifeCoverage}%`;
      document.getElementById("medicalCoverageBar").style.width = `${medicalCoverage}%`;
      document.getElementById("ciCoverageBar").style.width = `${ciCoverage}%`;

      const priorities = [
        { name: t.priorityNames[0], gap: lifeGap, desc: t.priorityDescs.life },
        { name: t.priorityNames[1], gap: ciGap, desc: t.priorityDescs.ci },
        { name: t.priorityNames[2], gap: medicalGap, desc: medicalGap > 0 ? t.priorityDescs.medicalNeed : t.priorityDescs.medicalEnough }
      ].sort((a, b) => b.gap - a.gap);

      document.getElementById("priorityList").innerHTML = priorities.map((item, index) => {
        const cls = index === 0 ? "priority-top" : index === 1 ? "priority-mid" : "priority-low";
        const label = t.priorityLabels[index] || t.priorityLabels[2];
        return `<div class="priority-line"><span class="${cls}">${label}：${item.name}</span><span>${item.desc}</span></div>`;
      }).join("");

        document.getElementById("scenarioSummary").textContent =
          `按当前填写资料估算，若家庭责任期内发生重大风险，现有可立即动用的寿险与资产合计约 ${money(lifeDeduct)}，距离覆盖家庭责任与负债压力仍有约 ${money(lifeGap)} 的差距。`;
      } else {
        document.getElementById("scenarioSummary").textContent =
          `Based on the information entered, if a major risk happens during your family responsibility period, immediately available life coverage / term life cover and liquid assets total about ${money(lifeDeduct)}. There would still be an estimated shortfall of ${money(lifeGap)} to cover living needs and debt pressure.`;

        : [

      document.getElementById("reasonList").innerHTML = reasonList.map(item => `<li>${item}</li>`).join("");

      const summaryList = currentLang === "zh"

                <div class="formula">缺口 = 总需求 - 现有保障 = ${money(ciNeed)} - ${money(existingCI)} = ${money(ciGap)}</div>

                当前选择 ${money(medicalTarget)}<br />

                ${existingMedical >= medicalTarget ? `现有保障已达到目标。` : `缺口 = 目标额度 - 现有医疗保障 = ${money(medicalTarget)} - ${money(existingMedical)} = ${money(medicalGap)}。`}
              `,

        : [

                <div class="formula">Deductible resources = existing life coverage / term life cover + liquid assets</div>
                ${money(existingLife)} + ${money(liquidAssets)} = ${money(lifeDeduct)}<br />
                <div class="formula">Gap = total need - deductible resources = ${money(lifeNeed)} - ${money(lifeDeduct)} = ${money(lifeGap)}</div>
              `,
              note: t.rowNotes.life
            },
            {
              title: "Critical illness / income protection",
              formula: `
                <div class="formula">Total need = annual income × recovery years + recovery budget + liability pressure pool</div>
                ${money(annualIncome)} × ${ciYears} + ${money(specialMedicalBudget)} + ${money(liabilityPressure)} = ${money(ciNeed)}<br />
                <div class="formula">Liability pressure pool = liabilities × 30%</div>
                ${money(liabilities)} × 30% = ${money(liabilityPressure)}<br />
                <div class="formula">Gap = total need - existing cover = ${money(ciNeed)} - ${money(existingCI)} = ${money(ciGap)}</div>
              `,
              note: t.rowNotes.ci
            },
            {
              title: "Medical cover",
              formula: `
                <div class="formula">Target amount = fixed medical target</div>
                Current selection ${money(medicalTarget)}<br />
                <div class="formula">Existing medical cover = ${money(existingMedical)}</div>
                ${existingMedical >= medicalTarget ? `Current cover already meets the selected target.` : `Gap = target amount - existing medical cover = ${money(medicalTarget)} - ${money(existingMedical)} = ${money(medicalGap)}.`}
              `,
              note: t.rowNotes.medical
            }
          ];

      document.getElementById("detailRows").innerHTML = rows.map(row => `
        <tr>
          <td><strong>${row.title}</strong></td>
          <td>${row.formula}</td>
          <td>${row.note}</td>
        </tr>
      `).join("");

      document.getElementById("statusText").textContent = t.statusReady(customerName);
      saveDraft();
      return { customerName, lang: currentLang };
    }

    async function buildPdfBlob() {
      const source = document.getElementById("reportArea");
      const scratch = document.createElement("div");
      scratch.style.position = "fixed";
      scratch.style.left = "-99999px";
      scratch.style.top = "0";
      scratch.style.width = "920px";
      scratch.style.background = "#ffffff";
      scratch.style.padding = "0";
      scratch.style.zIndex = "-1";
      document.body.appendChild(scratch);

      const pageWidthPx = 920;
      const pagePadding = 28;
      const printableHeightPx = Math.floor(pageWidthPx * 281 / 194);
      const pages = [];

      function createPage() {
        const page = document.createElement("div");
        page.style.width = `${pageWidthPx}px`;
        page.style.padding = `${pagePadding}px`;
        page.style.background = "#ffffff";
        page.style.display = "block";
        page.style.boxSizing = "border-box";

        const inner = document.createElement("div");
        inner.style.width = "100%";
        inner.style.margin = "0 auto";
        inner.style.border = "1px solid #dce6f0";
        inner.style.borderRadius = "24px";
        inner.style.overflow = "hidden";
        inner.style.background = "#ffffff";
        page.appendChild(inner);
        scratch.appendChild(page);
        return { page, inner };
      }

      let current = createPage();
      pages.push(current.page);

      Array.from(source.children).forEach((child) => {
        const clone = child.cloneNode(true);
        if (current.inner.children.length > 0) clone.style.marginTop = clone.style.marginTop || "14px";
        current.inner.appendChild(clone);

        if (current.page.offsetHeight > printableHeightPx && current.inner.children.length > 1) {
          current.inner.removeChild(clone);
          current = createPage();
          pages.push(current.page);
          clone.style.marginTop = "0";
          current.inner.appendChild(clone);
        }
      });

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const margin = 8;
      const pdfImgWidth = pageWidth - margin * 2;
      const usableHeight = pageHeight - margin * 2;

      for (let i = 0; i < pages.length; i++) {
        const canvas = await html2canvas(pages[i], {
          scale: 2,
          backgroundColor: "#ffffff",
          useCORS: true
        });
        const image = canvas.toDataURL("image/png");
        const imgHeight = canvas.height * pdfImgWidth / canvas.width;

        if (i > 0) pdf.addPage();

        let heightLeft = imgHeight;
        let position = margin;
        pdf.addImage(image, "PNG", margin, position, pdfImgWidth, imgHeight);
        heightLeft -= usableHeight;

        while (heightLeft > 0) {
          position = margin - (imgHeight - heightLeft);
          pdf.addPage();
          pdf.addImage(image, "PNG", margin, position, pdfImgWidth, imgHeight);
          heightLeft -= usableHeight;
        }
      }

      document.body.removeChild(scratch);
      return pdf.output("blob");
    }

    async function downloadPdf() {
      const t = translations[currentLang];
      const data = calculate();
      document.getElementById("statusText").textContent = t.statusGenerating;
      const blob = await buildPdfBlob();
      const fileName = currentLang === "zh"
        ? `${data.customerName}-保障需求量化报告.pdf`
        : `${data.customerName}-Protection-Needs-Quantifier.pdf`;
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 600);
      document.getElementById("statusText").textContent = t.statusDownloaded(data.customerName);
    }

    document.getElementById("langZh").addEventListener("click", () => {
      currentLang = "zh";
      applyLanguage();
    });
    document.getElementById("langEn").addEventListener("click", () => {
      currentLang = "en";
      applyLanguage();
    });
    document.getElementById("calculateBtn").addEventListener("click", calculate);
    document.getElementById("downloadBtn").addEventListener("click", downloadPdf);
    document.getElementById("downloadBtn2").addEventListener("click", downloadPdf);
    document.getElementById("birthday").addEventListener("change", () => { syncAge(); saveDraft(); });

    numericFields.forEach((id) => {
      document.getElementById(id).addEventListener("input", () => {
        formatNumericField(id);
        saveDraft();
      });
      document.getElementById(id).addEventListener("blur", () => formatNumericField(id));
    });

    fields.forEach(id => {
      document.getElementById(id).addEventListener("input", saveDraft);
      document.getElementById(id).addEventListener("change", saveDraft);
    });

    document.getElementById("reportDate").value = formatDate("");
    loadDraft();
    numericFields.forEach(formatNumericField);
    syncAge();
    applyLanguage();
  </script>
</body>
